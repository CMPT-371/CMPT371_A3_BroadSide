# ============================================================================
# BroadSide — Test Suite CI Workflow
# ============================================================================
# Runs the full pytest test suite on every push and pull request.
# Tests execute on the three major platforms (Ubuntu, macOS, Windows) across
# two Python versions (3.10 and 3.12) to catch platform-specific bugs.
#
# This workflow is the quality gate: if any test fails, the build fails
# and the PR cannot be merged. Unlike the lint workflow (which auto-fixes),
# test failures require human investigation and a code fix.
# ============================================================================

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      # Do not cancel other matrix jobs if one fails — we want the full
      # picture of which platforms/versions are broken.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]

    steps:
      # ── Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Python setup ──────────────────────────────────────────────────
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # ── Install dependencies ──────────────────────────────────────────
      # Install runtime deps (Pillow) + test runner (pytest).
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      # ── Run tests ─────────────────────────────────────────────────────
      - name: Run pytest
        run: python -m pytest
